<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Villacidro - La Regina</title>
    <style>
        /* Reset e Font */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80'); /* Sfondo montagna generico */
            background-size: cover;
            background-position: center;
        }

        /* IL TITOLO GIGANTE */
        h1 {
            font-size: 8rem; /* Dimensione gigante */
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #ffffff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 10px 10px 20px rgba(0,0,0,0.5);
        }

        /* Responsive per cellulari */
        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; }
        }

        .cta {
            margin-top: 20px;
            padding: 15px 30px;
            background: #e63946;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
        }

        .cta:hover { transform: scale(1.1); background: #ff4d5a; }
    </style>
</head>
<body>

    <section class="hero">
        <div>
            <h1>LA VILLACIDRO<br>LA NOSTRA REGINA</h1>
            <p style="font-size: 1.5rem; margin-top: 20px; font-weight: 300;">cattiva,acida e germofobica.</p>
            <br><br>
            <a href="#" class="cta">SCOPRI IL PERCORSO</a>
        </div>
    </section>

</body>
</html>
